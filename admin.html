<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Olga Gurumi</title>
    
    <link rel="icon" href="logo.jpg" type="image/jpeg">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
    <style>
        /* --- REGLA MAESTRA: Evita que los rellenos desborden el tamaño --- */
        * { box-sizing: border-box; }

        :root { 
            --rosa-header: #ffe4e1; 
            --rosa-fuerte: #e69ab0; 
            --blanco: #ffffff; 
            --texto-gris: #5c5c5c; 
        }
        
        body, html { 
            overflow-x: hidden; 
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--blanco); 
            color: var(--texto-gris); 
            margin: 0; padding: 0; 
        }
        
        /* HEADER ROSA + LOGO CIRCULAR */
        header { 
            background-color: #ffb7c5;
            padding: 15px 20px 25px 20px;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
            box-shadow: 0 4px 15px rgba(255, 183, 197, 0.5);
            margin-bottom: 20px;
            position: sticky;
            top: 0;
            z-index: 4000;
        }
        nav { 
            width: 100%; max-width: 1400px; margin: 0 auto; display: flex; 
            justify-content: space-between; align-items: center; 
        }
        .logo {
            font-size: 1.5em;
            font-weight: bold;
            color: #fff;
            text-decoration: none;
            display: flex;
            align-items: center;
        }
        .logo img { 
            height: 50px; width: 50px; 
            border-radius: 50%; object-fit: cover; border: 2px solid white; margin-right: 10px;
        }

        /* CONTENEDOR PRINCIPAL */
        .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
        h1 { text-align: center; color: var(--rosa-fuerte); margin-bottom: 30px; }
        
        /* FORMULARIO */
        form { 
            background: #fff; border: 1px solid #eee; 
            padding: 40px; border-radius: 20px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); 
            margin-bottom: 50px; 
            position: relative;
        }
        label { 
            display: block; margin-bottom: 8px; 
            font-weight: bold; color: var(--rosa-fuerte); 
        }
        input, textarea { 
            width: 100%; padding: 12px; margin-bottom: 20px; 
            border: 1px solid #ddd; border-radius: 8px; 
        }
        input[type="checkbox"] {
            width: auto;
            margin-bottom: 0;
            padding: 0;
        }
        
        /* Botones del Formulario */
        .btn-submit { 
            width: 100%; padding: 15px; 
            background: var(--rosa-fuerte); color: white; 
            border: none; border-radius: 50px; 
            font-weight: bold; cursor: pointer; 
            transition: 0.3s; font-size: 1.1em;
        }
        .btn-submit:hover { background: #d6809a; }
        
        .btn-cancelar { 
            background: #ccc; margin-top: 10px; display: none; 
        }
        .btn-cancelar:hover { background: #bbb; }

        /* GRID DE PRODUCTOS */
        #galeria { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
            gap: 25px; 
        }
        
        .item { 
            border: 1px solid #eee; 
            border-radius: 20px; 
            background: #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            /* AQUÍ ESTÁ EL ARREGLO: Espacio interno para que no toque los bordes */
            padding: 20px; 
            text-align: center; 
            position: relative;
            display: flex;
            flex-direction: column;
        }
        
        .item img.producto-img { 
            width: 100%; 
            height: 180px; 
            object-fit: cover; 
            border-radius: 15px; /* Imagen redondeada */
            margin-bottom: 15px;
            display: block; 
        }
        
        .item strong {
            display: block;
            color: var(--rosa-fuerte);
            font-size: 1.1em;
            margin-bottom: 5px;
        }
        
        /* BOTONES DE ACCIÓN CON ICONOS PNG */
        .acciones { display: flex; gap: 10px; justify-content: center; margin-top: auto; }
        
        .btn-accion { 
            padding: 8px 12px; 
            border-radius: 10px; 
            border: none; 
            cursor: pointer; 
            color: white; 
            font-size: 0.9em; 
            flex: 1; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 5px; /* Espacio entre icono y texto */
        }
        
        /* Estilo para tus iconos PNG */
        .icono-btn {
            width: 18px; 
            height: 18px; 
            object-fit: contain;
            filter: brightness(0) invert(1); /* Hace los iconos blancos para que resalten sobre el botón de color */
        }

        .btn-borrar { background-color: #d87093; } /* Rosa más oscuro/frambuesa para borrar */
        .btn-editar { background-color: #ffb7c5; } /* Rosa claro como el top bar para editar */
        .btn-borrar:hover { background-color: #c75b7a; }
        .btn-editar:hover { background-color: #fca6b7; }

        /* LOGOUT */
        .btn-logout {
            background: white; color: #ffb7c5; border: none;
            padding: 8px 15px; border-radius: 20px; cursor: pointer; font-weight: bold;
            transition: 0.3s;
        }
        .btn-logout:hover { background: #fff0f5; }

        /* MODAL DE RECORTE */
        .modal-crop {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 1000;
            justify-content: center; align-items: center; padding: 20px;
        }
        .modal-crop-content {
            background: #fff; padding: 20px; border-radius: 20px;
            width: 100%; max-width: 600px;
            display: flex; flex-direction: column; align-items: center;
        }
        .crop-container {
            width: 100%; max-height: 400px; min-height: 200px; overflow: hidden; margin-bottom: 20px; background:#f4f4f4; border-radius: 10px;
        }
        .crop-container img { max-width: 100%; display: block; }
        .botones-modal { display: flex; gap: 10px; width: 100%; }
        .btn-secundario { background: #ccc; }
        .btn-secundario:hover { background: #bbb; }

        @media (max-width: 768px) {
            header { padding: 15px 15px 25px 15px; } 
            .logo { font-size: 1.5em; }
            .logo img { height: 50px; width: 50px; } 
            #galeria { grid-template-columns: repeat(2, 1fr); gap: 10px; } 
            .item { padding: 10px; } 
            .acciones { flex-direction: column; gap: 5px; }
            .btn-accion { padding: 6px; font-size: 0.85em; }
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <a href="index.html" class="logo">
                <img src="logo.jpg" alt="Olga Gurumi"> Olga Gurumi
            </a>
            <div style="display: flex; gap: 15px; align-items: center;">
                <a href="index.html" style="text-decoration: none; color: white; font-weight: bold; font-size: 0.9em;">Ir a la Tienda &rarr;</a>
                <button id="btn-logout" class="btn-logout">Cerrar Sesión</button>
            </div>
        </nav>
    </header>

    <main class="container">
        <h1>Panel de Administración</h1>

        <form id="form-subida">
            <h2 id="form-titulo">Subir Producto</h2>
            
            <label>Nombre:</label><input type="text" id="nombre" required>
            <label>Descripción:</label><textarea id="descripcion" rows="3"></textarea>
            
            <label>Categorías (Elige hasta 3):</label>
            <div id="categorias-container" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; padding: 15px; border: 1px solid #ddd; border-radius: 8px; background: #fafafa;">
                <label style="display: flex; align-items: center; gap: 6px; font-weight: normal; color: #555; margin: 0; cursor: pointer;"><input type="checkbox" name="categoria" value="sin_categoria"> Sin Categoría / General</label>
                <label style="display: flex; align-items: center; gap: 6px; font-weight: normal; color: #555; margin: 0; cursor: pointer;"><input type="checkbox" name="categoria" value="san_valentin"> San Valentín</label>
                <label style="display: flex; align-items: center; gap: 6px; font-weight: normal; color: #555; margin: 0; cursor: pointer;"><input type="checkbox" name="categoria" value="dia_mujer"> Día de la Mujer</label>
                <label style="display: flex; align-items: center; gap: 6px; font-weight: normal; color: #555; margin: 0; cursor: pointer;"><input type="checkbox" name="categoria" value="flores_amarillas"> Flores Amarillas</label>
                <label style="display: flex; align-items: center; gap: 6px; font-weight: normal; color: #555; margin: 0; cursor: pointer;"><input type="checkbox" name="categoria" value="dia_nino"> Día del Niño</label>
                <label style="display: flex; align-items: center; gap: 6px; font-weight: normal; color: #555; margin: 0; cursor: pointer;"><input type="checkbox" name="categoria" value="para_ellos"> Para Ellos</label>
                <label style="display: flex; align-items: center; gap: 6px; font-weight: normal; color: #555; margin: 0; cursor: pointer;"><input type="checkbox" name="categoria" value="para_ellas"> Para Ellas</label>
            </div>
            
            <label>Foto:</label>
            <input type="file" id="imagen" accept="image/*">
            <small id="aviso-foto" style="color:#888; display:none;">(Deja esto vacío si no quieres cambiar la foto actual)</small>

            <hr style="border:0; border-top:1px solid #eee; margin:30px 0;">
            <label>Precio Amigurumi (S/):</label><input type="number" id="precio" step="0.01">
            <label>Precio Patrón (S/):</label><input type="number" id="precio_patron" step="0.01">
            <label>URL Patrón:</label><input type="url" id="url_patron">

            <button type="submit" id="btn-subir" class="btn-submit">Subir Producto</button>
            <button type="button" id="btn-cancelar" class="btn-submit btn-cancelar" onclick="cancelarEdicion()">Cancelar Edición</button>
        </form>

        <h2>Mis Productos</h2>
        <div id="galeria">Cargando...</div>
    </main>

    <!-- Modal para Recortar -->
    <div id="modal-crop" class="modal-crop">
        <div class="modal-crop-content">
            <h3 style="color: var(--rosa-fuerte); margin-top:0;">Ajustar Imagen</h3>
            <div class="crop-container">
                <img id="image-to-crop" src="">
            </div>
            <div class="botones-modal">
                <button type="button" class="btn-submit btn-secundario" id="btn-cancelar-crop">Cancelar</button>
                <button type="button" class="btn-submit" id="btn-aplicar-crop">Aplicar y Comprimir</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://qawdjysxudpymenemach.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFhd2RqeXN4dWRweW1lbmVtYWNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjI5NjAyNTgsImV4cCI6MjA3ODUzNjI1OH0.HBcysWDY8Nzahfx1doBN12mQJb1PNinxLspD6eCDp3A';
        
        // Cliente principal (Para verificar sesión)
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Cliente anónimo puro (Para realizar operaciones en base de datos sin restricciones de RLS authenticated)
        const supabaseAnon = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
            auth: { persistSession: false },
            global: { headers: { Authorization: `Bearer ${SUPABASE_KEY}` } }
        });
        
        // PROTEGER PÁGINA (Al login si no hay sesión)
        async function checkAuth() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) {
                window.location.href = 'logeo.html';
            }
        }
        checkAuth();

        // LOGOUT
        document.getElementById('btn-logout').addEventListener('click', async () => {
            await supabaseClient.auth.signOut();
            window.location.href = 'logeo.html';
        });

        const galeria = document.getElementById('galeria');
        const formSubida = document.getElementById('form-subida');
        const btnSubir = document.getElementById('btn-subir');
        const btnCancelar = document.getElementById('btn-cancelar');
        const avisoFoto = document.getElementById('aviso-foto');
        const tituloForm = document.getElementById('form-titulo');

        // Límite de 3 categorías seleccionadas
        document.querySelectorAll('input[name="categoria"]').forEach(cb => {
            cb.addEventListener('change', function() {
                const checkedCount = document.querySelectorAll('input[name="categoria"]:checked').length;
                if(checkedCount > 3) {
                    this.checked = false;
                    alert("Solo puedes elegir hasta 3 categorías para este amigurumi.");
                }
            });
        });

        let productosCache = []; 
        let editandoID = null;   

        // LOGIC FOR CROP & COMPRESS
        const imagenInput = document.getElementById('imagen');
        const modalCrop = document.getElementById('modal-crop');
        const imageToCrop = document.getElementById('image-to-crop');
        const btnCancelarCrop = document.getElementById('btn-cancelar-crop');
        const btnAplicarCrop = document.getElementById('btn-aplicar-crop');
        let cropper = null;
        let archivoImagenFinal = null;

        imagenInput.addEventListener('change', (e) => {
            const files = e.target.files;
            if (files && files.length > 0) {
                const file = files[0];
                const reader = new FileReader();
                reader.onload = (event) => {
                    imageToCrop.src = event.target.result;
                    modalCrop.style.display = 'flex';
                    if (cropper) cropper.destroy();
                    cropper = new Cropper(imageToCrop, {
                        aspectRatio: 1, // Cuadrado por defecto
                        viewMode: 2,
                        autoCropArea: 1
                    });
                };
                reader.readAsDataURL(file);
            }
        });

        btnCancelarCrop.addEventListener('click', () => {
            modalCrop.style.display = 'none';
            if (cropper) cropper.destroy();
            imagenInput.value = ''; // Reset input
            archivoImagenFinal = null;
        });

        btnAplicarCrop.addEventListener('click', async () => {
            if (!cropper) return;
            btnAplicarCrop.textContent = "Procesando...";
            btnAplicarCrop.disabled = true;

            const canvas = cropper.getCroppedCanvas({
                maxWidth: 1024,
                maxHeight: 1024
            });

            canvas.toBlob(async (blob) => {
                try {
                    const options = {
                        maxSizeMB: 0.3, // Comprimir a ~300kb
                        maxWidthOrHeight: 800,
                        useWebWorker: true
                    };
                    const imageFile = new File([blob], "img_recortada.jpg", { type: "image/jpeg" });
                    // La librería exporta la variable global 'imageCompression'
                    const compressedFile = await imageCompression(imageFile, options);
                    
                    archivoImagenFinal = compressedFile;
                    modalCrop.style.display = 'none';
                    if (cropper) cropper.destroy();
                    
                    avisoFoto.textContent = "✅ Imagen recortada y procesada correctamente";
                    avisoFoto.style.display = "block";
                    avisoFoto.style.color = "green";
                } catch (error) {
                    console.error("Error comprimiendo imagen:", error);
                    alert("Error al comprimir la imagen: " + error.message);
                } finally {
                    btnAplicarCrop.textContent = "Aplicar y Comprimir";
                    btnAplicarCrop.disabled = false;
                }
            }, 'image/jpeg', 0.9);
        });

        // --- CARGAR PRODUCTOS ---
        async function cargarPreview() {
            const { data } = await supabaseAnon.from('amigurumis').select('*').order('created_at', { ascending: false });
            if(data) {
                productosCache = data; 
                galeria.innerHTML = '';
                data.forEach(ami => {
                    const div = document.createElement('div');
                    div.className = 'item';
                    const imgUrl = ami.imagen_url || 'https://via.placeholder.com/150';
                    div.innerHTML = `
                        <img src="${imgUrl}" class="producto-img">
                        <strong>${ami.nombre}</strong>
                        <div>S/ ${parseFloat(ami.precio).toFixed(2)}</div>
                        <div class="acciones">
                            <button onclick="prepararEdicion(${ami.id})" class="btn-accion btn-editar">
                                <img src="editar.png" class="icono-btn" alt="Editar"> Editar
                            </button>
                            <button onclick="eliminarProducto(${ami.id})" class="btn-accion btn-borrar">
                                <img src="delete.png" class="icono-btn" alt="Borrar"> Borrar
                            </button>
                        </div>
                    `;
                    galeria.appendChild(div);
                });
            }
        }

        // --- PREPARAR EDICIÓN ---
        window.prepararEdicion = (id) => {
            const producto = productosCache.find(p => p.id === id);
            if(!producto) return;

            document.getElementById('nombre').value = producto.nombre;
            document.getElementById('descripcion').value = producto.descripcion || '';
            
            const categoriasGuardadas = producto.categoria ? producto.categoria.split(',') : ['sin_categoria'];
            document.querySelectorAll('input[name="categoria"]').forEach(cb => {
                cb.checked = categoriasGuardadas.includes(cb.value);
            });
            
            document.getElementById('precio').value = producto.precio;
            document.getElementById('precio_patron').value = producto.precio_patron;
            document.getElementById('url_patron').value = producto.url_patron || '';
            
            editandoID = id;
            archivoImagenFinal = null;
            tituloForm.textContent = "Editar Producto";
            btnSubir.textContent = "Actualizar Cambios";
            btnSubir.style.background = "#4dabf7"; 
            btnCancelar.style.display = "block";
            
            avisoFoto.textContent = "(Deja esto vacío si no quieres cambiar la foto actual)";
            avisoFoto.style.color = "#888";
            avisoFoto.style.display = "block";
            
            document.getElementById('imagen').required = false; 
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        // --- CANCELAR EDICIÓN ---
        window.cancelarEdicion = () => {
            formSubida.reset();
            
            document.querySelectorAll('input[name="categoria"]').forEach(cb => cb.checked = false);
            const defaultCat = document.querySelector('input[name="categoria"][value="sin_categoria"]');
            if(defaultCat) defaultCat.checked = true;
            
            editandoID = null;
            archivoImagenFinal = null;
            tituloForm.textContent = "Subir Producto";
            btnSubir.textContent = "Subir Producto";
            btnSubir.style.background = "#e69ab0"; 
            btnCancelar.style.display = "none";
            avisoFoto.textContent = "(Deja esto vacío si no quieres cambiar la foto actual)";
            avisoFoto.style.color = "#888";
            avisoFoto.style.display = "none";
            document.getElementById('imagen').required = true;
        };

        // --- ELIMINAR ---
        window.eliminarProducto = async (id) => {
            if(!confirm("¿Borrar definitivamente?")) return;
            const { error } = await supabaseAnon.from('amigurumis').delete().eq('id', id);
            if(!error) { alert("¡Eliminado!"); cargarPreview(); }
            else { alert("Error al borrar (Revisa permisos DELETE en Supabase): " + error.message); }
        };

        // --- GUARDAR (CREAR O ACTUALIZAR) ---
        formSubida.addEventListener('submit', async (e) => {
            e.preventDefault(); 
            const nombre = document.getElementById('nombre').value;
            const archivoImagen = archivoImagenFinal || document.getElementById('imagen').files[0];
            const precio = document.getElementById('precio').value;
            
            if (!editandoID && !archivoImagen) { alert('La foto es obligatoria para nuevos productos'); return; }

            btnSubir.disabled = true; btnSubir.textContent = 'Procesando...';

            try {
                let urlFinalFoto = null;

                if (archivoImagen) {
                    const ext = archivoImagen.name ? archivoImagen.name.split('.').pop() : 'jpg';
                    const nombreLimpio = archivoImagen.name ? archivoImagen.name.replace(/[^a-zA-Z0-9]/g, '_') : 'img';
                    const nombreArchivo = `public/${Date.now()}_${nombreLimpio}.${ext}`;
                    
                    const { data: uploadData, error: uploadError } = await supabaseAnon.storage.from('fotos_amigurumis').upload(nombreArchivo, archivoImagen, {
                        cacheControl: '3600',
                        upsert: true,
                        contentType: archivoImagen.type || 'image/jpeg'
                    });
                    
                    if (uploadError) {
                        throw new Error('No se pudo subir la foto: ' + uploadError.message);
                    }

                    const { data } = supabaseAnon.storage.from('fotos_amigurumis').getPublicUrl(nombreArchivo);
                    urlFinalFoto = data.publicUrl;
                }

                // Obtenemos las categorías marcadas y las separamos por comas
                const seleccionadas = Array.from(document.querySelectorAll('input[name="categoria"]:checked')).map(cb => cb.value);
                const categoriaFinal = seleccionadas.length > 0 ? seleccionadas.join(',') : 'sin_categoria';

                const datos = {
                    nombre,
                    descripcion: document.getElementById('descripcion').value,
                    categoria: categoriaFinal,
                    precio: precio ? parseFloat(precio) : null,
                    precio_patron: document.getElementById('precio_patron').value ? parseFloat(document.getElementById('precio_patron').value) : null,
                    url_patron: document.getElementById('url_patron').value || null
                };

                if (urlFinalFoto) {
                    datos.imagen_url = urlFinalFoto;
                }

                let dbError;
                if (editandoID) {
                    const { data, error } = await supabaseAnon.from('amigurumis').update(datos).eq('id', editandoID).select();
                    if (data && data.length === 0 && !error) {
                        throw new Error("El producto no existe o está bloqueado por permisos.");
                    }
                    dbError = error;
                } else {
                    if (!urlFinalFoto) throw new Error("Error interno: Falta URL de foto");
                    const { error } = await supabaseAnon.from('amigurumis').insert([datos]);
                    dbError = error;
                }

                if (dbError) throw new Error('Error en Base de Datos: ' + dbError.message);

                alert(editandoID ? '¡Producto actualizado!' : '¡Producto creado!');
                cancelarEdicion();
                cargarPreview();

            } catch (error) {
                console.error(error);
                alert('Error: ' + error.message);
            } finally {
                btnSubir.disabled = false; 
                if(!editandoID) btnSubir.textContent = 'Subir Producto';
                else btnSubir.textContent = 'Actualizar Cambios';
            }
        });

        document.addEventListener('DOMContentLoaded', cargarPreview);
    </script>
</body>
</html>
